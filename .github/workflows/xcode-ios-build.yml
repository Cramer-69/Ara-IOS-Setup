name: Xcode iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install iOS development tools
        run: brew bundle --no-lock

      - name: Run SwiftLint
        run: |
          if find . -name "*.swift" -not -path "./.git/*" | grep -q .; then
            swiftlint lint --reporter github-actions-logging
          else
            echo "No Swift files found — skipping SwiftLint."
          fi
